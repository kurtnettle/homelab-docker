services:
  wakapi-db:
    image: postgres:bookworm
    container_name: wakapi-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGPORT: ${POSTGRES_PORT}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d postgres" ]
      interval: 30s
      timeout: 10s

  wakapi:
    image: n1try/wakapi:latest
    container_name: wakapi
    restart: always
    environment:
      TZ: "Asia/Dhaka"
      WAKAPI_PORT: ${WAKAPI_PORT}
      WAKAPI_DB_TYPE: ${WAKAPI_DB_TYPE}
      WAKAPI_DB_HOST: ${WAKAPI_DB_HOST}
      WAKAPI_DB_PORT: ${POSTGRES_PORT}
      WAKAPI_DB_USER: ${POSTGRES_USER}
      WAKAPI_DB_PASSWORD: ${POSTGRES_PASSWORD}
      WAKAPI_DB_NAME: ${POSTGRES_DB}
    depends_on:
      wakapi-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO - http://localhost:${WAKAPI_PORT}/api/health | tr '\n' ' ' | grep -qx 'app=1 db=1'"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - default
      - common-network

networks:
  common-network:
    external: true
